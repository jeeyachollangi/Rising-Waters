<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Waters - Analyzing Climate Inputs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Main Container -->
    <main class="loading-container">
        <div class="loading-card animate-fade-in">
            <div class="loader-spinner">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
            </div>
            
            <h2 class="loading-title">Analyzing Weather Parameters</h2>
            <p class="loading-subtitle">Please wait while the machine learning model evaluates flood risk indicators...</p>
            
            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
            
            <!-- Loading Status Logs -->
            <div class="status-logs">
                <div class="log-item active" id="log-1">
                    <i class="fa-solid fa-check-double log-icon"></i>
                    <span>Loading saved XGBoost classifier...</span>
                </div>
                <div class="log-item" id="log-2">
                    <i class="fa-solid fa-spinner fa-spin log-icon"></i>
                    <span>Scaling input features via StandardScaler...</span>
                </div>
                <div class="log-item" id="log-3">
                    <i class="fa-solid fa-circle-dot log-icon"></i>
                    <span>Calculating classification boundaries...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const log1 = document.getElementById('log-1');
            const log2 = document.getElementById('log-2');
            const log3 = document.getElementById('log-3');
            
            const redirectUrl = "{{ redirect_url }}";
            
            // Progress animation and log sequence
            setTimeout(() => {
                // Step 1 done, start Step 2
                progressBar.style.width = '40%';
                log1.classList.remove('active');
                log1.querySelector('.log-icon').className = 'fa-solid fa-circle-check log-icon success';
                
                log2.classList.add('active');
            }, 800);
            
            setTimeout(() => {
                // Step 2 done, start Step 3
                progressBar.style.width = '75%';
                log2.classList.remove('active');
                log2.querySelector('.log-icon').className = 'fa-solid fa-circle-check log-icon success';
                
                log3.classList.add('active');
                log3.querySelector('.log-icon').className = 'fa-solid fa-spinner fa-spin log-icon';
            }, 1600);
            
            setTimeout(() => {
                // Step 3 done, finish progress
                progressBar.style.width = '100%';
                log3.classList.remove('active');
                log3.querySelector('.log-icon').className = 'fa-solid fa-circle-check log-icon success';
            }, 2300);
            
            setTimeout(() => {
                // Redirect to result page
                window.location.href = redirectUrl;
            }, 2700);
        });
    </script>

</body>
</html>
